<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="white">
  <style>
    #wing-left, #wing-right {
      animation: wing-flap 0.48s ease-in-out infinite alternate;
    }
    @keyframes wing-flap {
      from { transform: translateY(-7px); }
      to   { transform: translateY(7px);  }
    }
  </style>

  <!-- ─── WiFi / Antenna ─── -->
  <circle cx="100" cy="47" r="3.5"/>
  <path d="M90 47 A10 10 0 0 1 110 47"  stroke="white" stroke-width="3"   fill="none" stroke-linecap="round"/>
  <path d="M83 47 A17 17 0 0 1 117 47"  stroke="white" stroke-width="3"   fill="none" stroke-linecap="round"/>
  <path d="M76 47 A24 24 0 0 1 124 47"  stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ─── Head ─── -->
  <rect x="87" y="51" width="26" height="13" rx="3"/>

  <!-- ─── LEFT WING (animated) ─── -->
  <g id="wing-left">
    <rect x="16"  y="79"  width="30" height="3.5" rx="1.5"/>
    <rect x="10"  y="85"  width="45" height="4"   rx="1.5"/>
    <rect x="7"   y="91"  width="60" height="5"   rx="2"/>
    <rect x="10"  y="98"  width="45" height="4"   rx="1.5"/>
    <rect x="16"  y="104" width="30" height="3.5" rx="1.5"/>
  </g>

  <!-- ─── RIGHT WING (animated) ─── -->
  <g id="wing-right">
    <rect x="154" y="79"  width="30" height="3.5" rx="1.5"/>
    <rect x="145" y="85"  width="45" height="4"   rx="1.5"/>
    <rect x="133" y="91"  width="60" height="5"   rx="2"/>
    <rect x="145" y="98"  width="45" height="4"   rx="1.5"/>
    <rect x="154" y="104" width="30" height="3.5" rx="1.5"/>
  </g>

  <!-- ─── Main body hexagon ─── -->
  <polygon points="100,64 126,78 126,116 100,130 74,116 74,78"/>
  <!-- Eyes / sensors (dark cutout) -->
  <rect x="83"  y="85" width="13" height="11" rx="2" fill="#080808"/>
  <rect x="104" y="85" width="13" height="11" rx="2" fill="#080808"/>
  <rect x="96"  y="88" width="8"  height="5"  rx="1" fill="#080808"/>

  <!-- ─── Abdomen ─── -->
  <polygon points="100,131 115,139 115,155 100,163 85,155 85,139"/>

  <!-- ─── Legs ─── -->
  <line x1="79"  y1="150" x2="63"  y2="166" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="162" x2="100" y2="178" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="121" y1="150" x2="137" y2="166" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
</svg>
